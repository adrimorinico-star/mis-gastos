<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Gastos Diarios</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sync-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-slate-100 flex justify-center h-screen md:py-8 font-sans antialiased text-slate-800">

    <div class="bg-white w-full max-w-md md:rounded-3xl shadow-2xl flex flex-col h-full md:h-auto md:max-h-[850px] overflow-hidden relative">
        
        <header class="bg-indigo-600 text-white p-6 rounded-b-3xl shadow-md z-10 relative">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold tracking-wide">Mis Gastos</h1>
                <div class="flex gap-2">
                    <!-- Botón de instalación ahora visible por defecto (se quitó la clase 'hidden') -->
                    <button id="installAppBtn" class="p-2 bg-emerald-500 hover:bg-emerald-400 rounded-full transition-colors relative" title="Instalar Aplicación">
                        <i class="ph ph-download text-xl"></i>
                    </button>
                    <button onclick="triggerManualSync()" class="p-2 bg-indigo-500 hover:bg-indigo-400 rounded-full transition-colors relative" title="Sincronizar a la nube">
                        <i id="syncIcon" class="ph ph-arrows-clockwise text-xl"></i>
                        <span id="syncBadge" class="hidden absolute top-0 right-0 w-3 h-3 bg-red-400 rounded-full border-2 border-indigo-600"></span>
                    </button>
                    <button onclick="exportToCSV()" class="p-2 bg-indigo-500 hover:bg-indigo-400 rounded-full transition-colors" title="Exportar a CSV">
                        <i class="ph ph-download-simple text-xl"></i>
                    </button>
                </div>
            </div>
            <div>
                <p class="text-indigo-200 text-sm font-medium flex items-center justify-between">
                    Total Acumulado
                    <span id="connectionStatus" class="text-xs bg-indigo-500/50 px-2 py-0.5 rounded text-indigo-100 flex items-center gap-1">
                        <i class="ph ph-wifi-high"></i> Online
                    </span>
                </p>
                <h2 class="text-4xl font-extrabold mt-1" id="totalAmount">$0.00</h2>
            </div>
        </header>

        <!-- Mensaje modal personalizado para cuando se intenta instalar en vista previa -->
        <div id="customAlert" class="hidden absolute top-24 right-4 bg-slate-800 text-white text-sm p-4 rounded-xl shadow-2xl z-50 fade-in border border-slate-700 max-w-[250px]">
            <p class="mb-3"><i class="ph ph-info text-indigo-400 text-lg align-middle mr-1"></i>Para instalar la app de forma real, debes abrirla desde tu enlace seguro de publicación (ej. GitHub Pages).</p>
            <button onclick="document.getElementById('customAlert').classList.add('hidden')" class="w-full bg-slate-700 hover:bg-slate-600 py-1.5 rounded-lg font-semibold transition-colors">Entendido</button>
        </div>

        <main class="flex-1 overflow-y-auto no-scrollbar p-6 bg-slate-50">
            
            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-8">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Nuevo Gasto</h3>
                <form id="expenseForm" class="space-y-4">
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Fecha</label>
                            <input type="date" id="dateInput" required class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Monto ($)</label>
                            <input type="number" id="amountInput" step="0.01" min="0" placeholder="0.00" required class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-sm font-bold text-indigo-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Descripción</label>
                        <input type="text" id="descInput" placeholder="Ej. Café, Gasolina..." required class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Categoría</label>
                        <select id="categoryInput" required class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all appearance-none">
                            <option value="" disabled selected>Selecciona una categoría</option>
                            <option value="Alimentación">🛒 Alimentación</option>
                            <option value="Transporte">🚌 Transporte</option>
                            <option value="Vivienda">🏠 Vivienda</option>
                            <option value="Servicios">💡 Servicios</option>
                            <option value="Ocio">🎬 Ocio & Entretenimiento</option>
                            <option value="Salud">💊 Salud</option>
                            <option value="Ropa">🛍️ Ropa & Compras</option>
                            <option value="Otros">❓ Otros</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit" id="submitBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all flex justify-center items-center gap-2">
                            <i class="ph ph-plus-circle text-lg"></i><span>Añadir Gasto</span>
                        </button>
                        <button type="button" id="cancelBtn" onclick="cancelEdit()" class="hidden bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3.5 px-4 rounded-xl transition-all flex justify-center items-center">
                            <i class="ph ph-x text-lg"></i>
                        </button>
                    </div>
                </form>
            </section>

            <section id="chartSection" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-8 hidden fade-in">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 text-center">Gastos por Categoría</h3>
                <div class="relative h-64 flex justify-center items-center">
                    <canvas id="expenseChart"></canvas>
                </div>
            </section>

            <section>
                <div class="flex justify-between items-end mb-4 px-1">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider">Historial</h3>
                    <span id="entryCount" class="text-xs font-semibold text-slate-400 bg-slate-200 px-2 py-1 rounded-md">0 registros</span>
                </div>
                <div id="expenseList" class="space-y-3 pb-8"></div>
                <div id="emptyState" class="hidden flex flex-col items-center justify-center py-10 text-slate-400">
                    <i class="ph ph-receipt text-6xl mb-3 opacity-50"></i>
                    <p class="text-sm">No hay gastos registrados aún.</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN ---
        const GOOGLE_APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtcr6je6lejF7HeYKaDuI78vosZImXeedxry_bhcVq9W07lFDKZHyDtLJPFbc6K2sYBA/exec'; 
        
        let expenses = [];
        let editingId = null; 
        let db; 
        let isSyncing = false;
        let expenseChart; // Variable para la instancia del gráfico (NUEVO)

        // Referencias DOM
        const form = document.getElementById('expenseForm');
        const [dateInput, amountInput, descInput, categoryInput] = ['dateInput', 'amountInput', 'descInput', 'categoryInput'].map(id => document.getElementById(id));
        const [expenseList, totalAmountEl, emptyState, entryCount, submitBtn, cancelBtn] = ['expenseList', 'totalAmount', 'emptyState', 'entryCount', 'submitBtn', 'cancelBtn'].map(id => document.getElementById(id));
        const [syncIcon, syncBadge, connectionStatus, installAppBtn, chartSection] = ['syncIcon', 'syncBadge', 'connectionStatus', 'installAppBtn', 'chartSection'].map(id => document.getElementById(id));

        dateInput.value = new Date().toISOString().split('T')[0];
        const formatter = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 2 });
        
        // Configuración visual de categorías (Colores hexadecimales añadidos para Chart.js)
        const categoryConfig = {
            "Alimentación": { icon: "ph-shopping-cart", color: "text-emerald-500", bg: "bg-emerald-100", hex: "#10b981" },
            "Transporte": { icon: "ph-bus", color: "text-blue-500", bg: "bg-blue-100", hex: "#3b82f6" },
            "Vivienda": { icon: "ph-house", color: "text-orange-500", bg: "bg-orange-100", hex: "#f97316" },
            "Servicios": { icon: "ph-lightning", color: "text-yellow-500", bg: "bg-yellow-100", hex: "#eab308" },
            "Ocio": { icon: "ph-popcorn", color: "text-purple-500", bg: "bg-purple-100", hex: "#a855f7" },
            "Salud": { icon: "ph-pill", color: "text-red-500", bg: "bg-red-100", hex: "#ef4444" },
            "Ropa": { icon: "ph-bag", color: "text-pink-500", bg: "bg-pink-100", hex: "#ec4899" },
            "Otros": { icon: "ph-dots-three-circle", color: "text-slate-500", bg: "bg-slate-200", hex: "#64748b" }
        };

        // --- 2. INICIALIZACIÓN DE INDEXEDDB ---
        const request = indexedDB.open("MisGastosDB_PWA", 2);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains('gastos')) db.createObjectStore('gastos', { keyPath: 'id' });
        };
        request.onsuccess = (e) => { db = e.target.result; loadDataFromDB(); };

        function loadDataFromDB() {
            const store = db.transaction(['gastos'], 'readonly').objectStore('gastos');
            store.getAll().onsuccess = (e) => {
                expenses = e.target.result || [];
                renderExpenses();
                autoSync();
            };
        }

        // --- 3. GESTIÓN DE ESTADOS DE RED ---
        window.addEventListener('online', () => {
            connectionStatus.innerHTML = '<i class="ph ph-wifi-high"></i> Online';
            connectionStatus.className = 'text-xs bg-emerald-500/20 px-2 py-0.5 rounded text-emerald-200 flex items-center gap-1';
            autoSync();
        });
        window.addEventListener('offline', () => {
            connectionStatus.innerHTML = '<i class="ph ph-wifi-slash"></i> Offline';
            connectionStatus.className = 'text-xs bg-red-500/50 px-2 py-0.5 rounded text-red-100 flex items-center gap-1';
        });
        if (!navigator.onLine) window.dispatchEvent(new Event('offline'));

        // --- 4. LÓGICA DE SINCRONIZACIÓN ---
        async function autoSync() {
            if (!navigator.onLine || isSyncing) return;
            const pendingItems = expenses.filter(e => e.syncStatus === 'pending');
            if (pendingItems.length === 0) { syncBadge.classList.add('hidden'); return; }
            isSyncing = true;
            syncIcon.classList.add('sync-spin');
            syncBadge.classList.add('hidden');
            let changesMade = false;
            for (let item of pendingItems) {
                try {
                    await fetch(GOOGLE_APP_SCRIPT_URL, {
                        method: 'POST', mode: 'no-cors',
                        body: JSON.stringify({ action: item.lastAction, data: item })
                    });
                    if (item.isDeleted) {
                        expenses = expenses.filter(e => e.id !== item.id);
                        db.transaction(['gastos'], 'readwrite').objectStore('gastos').delete(item.id);
                    } else {
                        item.syncStatus = 'synced';
                        saveExpenseToDB(item, true);
                    }
                    changesMade = true;
                } catch (error) { console.error("Error de conexión durante sync", error); break; }
            }
            isSyncing = false;
            syncIcon.classList.remove('sync-spin');
            if (changesMade) renderExpenses();
            if (expenses.some(e => e.syncStatus === 'pending')) syncBadge.classList.remove('hidden');
        }

        function triggerManualSync() { autoSync(); }

        function saveExpenseToDB(expense, skipRender = false) {
            if (!db) return;
            const store = db.transaction(['gastos'], 'readwrite').objectStore('gastos');
            store.put(expense); 
            if(!skipRender) { renderExpenses(); autoSync(); }
        }

        // --- 5. OPERACIONES CRUD ---
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (editingId) {
                const index = expenses.findIndex(exp => exp.id === editingId);
                if (index !== -1) {
                    expenses[index] = {
                        ...expenses[index],
                        date: dateInput.value, amount: parseFloat(amountInput.value),
                        description: descInput.value, category: categoryInput.value,
                        syncStatus: 'pending',
                        lastAction: expenses[index].lastAction === 'add' && expenses[index].syncStatus === 'pending' ? 'add' : 'edit',
                        timestamp: new Date().getTime()
                    };
                    saveExpenseToDB(expenses[index]);
                }
                cancelEdit();
            } else {
                const newExpense = {
                    id: crypto.randomUUID(), date: dateInput.value, amount: parseFloat(amountInput.value),
                    description: descInput.value, category: categoryInput.value,
                    syncStatus: 'pending', lastAction: 'add', isDeleted: false,
                    timestamp: new Date().getTime()
                };
                expenses.unshift(newExpense);
                saveExpenseToDB(newExpense);
                amountInput.value = ''; descInput.value = ''; categoryInput.value = ''; descInput.focus();
            }
        });

        function deleteExpense(id) {
            if(confirm('¿Estás seguro de eliminar este registro?')) {
                const index = expenses.findIndex(e => e.id === id);
                if (index !== -1) {
                    const item = expenses[index];
                    if (item.syncStatus === 'pending' && item.lastAction === 'add') {
                        expenses.splice(index, 1);
                        db.transaction(['gastos'], 'readwrite').objectStore('gastos').delete(id);
                        renderExpenses();
                    } else {
                        item.isDeleted = true; item.syncStatus = 'pending'; item.lastAction = 'delete';
                        saveExpenseToDB(item);
                    }
                }
            }
        }

        function editExpense(id) {
            const expense = expenses.find(e => e.id === id);
            if (!expense) return;
            editingId = id;
            dateInput.value = expense.date; amountInput.value = expense.amount;
            descInput.value = expense.description; categoryInput.value = expense.category;
            submitBtn.classList.replace('bg-indigo-600', 'bg-emerald-600');
            submitBtn.innerHTML = '<i class="ph ph-check-circle text-lg"></i><span>Actualizar</span>';
            cancelBtn.classList.remove('hidden');
            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingId = null;
            amountInput.value = ''; descInput.value = ''; categoryInput.value = '';
            dateInput.value = new Date().toISOString().split('T')[0];
            submitBtn.classList.replace('bg-emerald-600', 'bg-indigo-600');
            submitBtn.innerHTML = '<i class="ph ph-plus-circle text-lg"></i><span>Añadir Gasto</span>';
            cancelBtn.classList.add('hidden');
        }

        // --- 6. RENDERIZADO VISUAL Y GRÁFICOS ---
        function renderExpenses() {
            expenseList.innerHTML = '';
            let total = 0;
            const visibleExpenses = expenses.filter(e => !e.isDeleted);
            
            // Gestión de Empty State y Sección de Gráfico
            if (visibleExpenses.length === 0) {
                emptyState.classList.remove('hidden');
                chartSection.classList.add('hidden');
            } else {
                emptyState.classList.add('hidden');
                chartSection.classList.remove('hidden');
                updateChart(visibleExpenses);
            }

            entryCount.textContent = `${visibleExpenses.length} registro${visibleExpenses.length !== 1 ? 's' : ''}`;
            const sortedExpenses = [...visibleExpenses].sort((a, b) => new Date(b.date) - new Date(a.date));

            sortedExpenses.forEach(expense => {
                total += expense.amount;
                const catConf = categoryConfig[expense.category] || categoryConfig["Otros"];
                const isSynced = expense.syncStatus === 'synced';
                const statusIcon = isSynced 
                    ? `<i class="ph ph-cloud-check text-emerald-500 text-lg" title="Sincronizado"></i>`
                    : `<i class="ph ph-cloud-arrow-up text-amber-500 text-lg" title="Pendiente"></i>`;

                const item = document.createElement('div');
                item.className = 'fade-in bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4 group';
                item.innerHTML = `
                    <div class="w-12 h-12 rounded-xl flex items-center justify-center shrink-0 ${catConf.bg} ${catConf.color}">
                        <i class="ph ${catConf.icon} text-2xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <h4 class="font-bold text-slate-800 truncate">${expense.description}</h4>
                            ${statusIcon}
                        </div>
                        <div class="flex items-center gap-2 text-xs text-slate-500 mt-1">
                            <span class="bg-slate-100 px-2 py-0.5 rounded-md font-medium">${expense.category}</span>
                            <span>•</span>
                            <span>${new Date(expense.date + 'T00:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'short' })}</span>
                        </div>
                    </div>
                    <div class="text-right shrink-0 flex flex-col items-end justify-center">
                        <p class="font-bold text-slate-800">${formatter.format(expense.amount)}</p>
                        <div class="flex gap-3 mt-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                            <button onclick="editExpense('${expense.id}')" class="text-indigo-500"><i class="ph ph-pencil-simple text-sm"></i></button>
                            <button onclick="deleteExpense('${expense.id}')" class="text-red-400"><i class="ph ph-trash text-sm"></i></button>
                        </div>
                    </div>
                `;
                expenseList.appendChild(item);
            });
            totalAmountEl.textContent = formatter.format(total);
        }

        function updateChart(visibleExpenses) {
            const totalsByCategory = {};
            visibleExpenses.forEach(expense => {
                const cat = expense.category;
                totalsByCategory[cat] = (totalsByCategory[cat] || 0) + expense.amount;
            });

            const labels = Object.keys(totalsByCategory);
            const data = Object.values(totalsByCategory);
            const colors = labels.map(label => categoryConfig[label]?.hex || "#64748b");

            const ctx = document.getElementById('expenseChart').getContext('2d');

            if (expenseChart) {
                expenseChart.data.labels = labels;
                expenseChart.data.datasets[0].data = data;
                expenseChart.data.datasets[0].backgroundColor = colors;
                expenseChart.update();
            } else {
                expenseChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: colors,
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { boxWidth: 12, padding: 15, font: { size: 11 } }
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const value = context.parsed;
                                        return ` ${formatter.format(value)}`;
                                    }
                                }
                            }
                        },
                        cutout: '70%'
                    }
                });
            }
        }

        function exportToCSV() {
            const visibleExpenses = expenses.filter(e => !e.isDeleted);
            if (visibleExpenses.length === 0) return alert("No hay datos para exportar.");
            let csvContent = "Fecha,Categoria,Descripcion,Monto\n";
            visibleExpenses.forEach(row => {
                csvContent += `${row.date},${row.category},"${row.description.replace(/"/g, '""')}",${row.amount}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob); link.download = `Mis_Gastos_${new Date().toISOString().split('T')[0]}.csv`; link.click();
        }

        // --- 7. LÓGICA DE INSTALACIÓN PWA (BOTÓN PERSONALIZADO) ---
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); 
            deferredPrompt = e;
        });

        installAppBtn.addEventListener('click', async () => {
            if (deferredPrompt !== null) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') console.log('PWA aceptada');
                deferredPrompt = null; 
                installAppBtn.classList.add('hidden'); // Ocultar si la instalación fue exitosa
            } else {
                // Mostrar alerta visual si se intenta instalar desde la vista previa o entorno local
                document.getElementById('customAlert').classList.remove('hidden');
            }
        });

        window.addEventListener('appinstalled', () => {
            installAppBtn.classList.add('hidden'); deferredPrompt = null;
        });

        // --- 8. REGISTRO DE SERVICE WORKER REAL ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                    navigator.serviceWorker.register('./sw.js')
                        .then(reg => console.log('SW registrado', reg.scope))
                        .catch(err => console.error('Error SW', err));
                } else {
                    console.log('SW omitido: el protocolo actual (' + window.location.protocol + ') no soporta Service Workers. Funcionará correctamente al subirlo a GitHub Pages.');
                }
            });
        }
    </script>
</body>
</html>
